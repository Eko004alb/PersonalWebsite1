  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 60);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
  </script>
  <script>
    // #region agent log
    (() => {
      const runId = 'pre-fix-1';
      const sendDebug = (hypothesisId, message, data) => {
        fetch('http://127.0.0.1:7259/ingest/2bce858e-d49e-43e1-a51c-5e826b6f5e27',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9a9e75'},body:JSON.stringify({sessionId:'9a9e75',runId,hypothesisId,location:'reading.html:debug-circles',message,data,timestamp:Date.now()})}).catch(()=>{});
        if (navigator.sendBeacon) {
          const payload = JSON.stringify({sessionId:'9a9e75',runId,hypothesisId,location:'reading.html:debug-circles:beacon',message,data,timestamp:Date.now()});
          navigator.sendBeacon('http://127.0.0.1:7259/ingest/2bce858e-d49e-43e1-a51c-5e826b6f5e27', new Blob([payload], { type: 'application/json' }));
        }
      };
      window.addEventListener('load', () => {
        const circles = Array.from(document.querySelectorAll('.decor-circle'));
        sendDebug('H1', 'Viewport and page context', { pathname: window.location.pathname, viewportWidth: window.innerWidth, viewportHeight: window.innerHeight });
        sendDebug('H4', 'Circle DOM presence', { circleCount: circles.length, classes: circles.map((el) => el.className) });
      });
    })();
    // #endregion
  </script>
