<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Erik Guza</title>
  <meta name="description" content="Project details for Erik Guza." />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { cursor: auto !important; }
    .project-main {
      padding-top: 96px;
      min-height: calc(100vh - 160px);
    }
    .project-shell {
      display: grid;
      gap: 20px;
      margin-top: 16px;
    }
    .project-back {
      display: inline-flex;
      text-decoration: none;
      color: var(--text-mid);
      font-size: 14px;
    }
    .project-back:hover { color: var(--text); }
    .project-hero {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-frost);
      overflow: hidden;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
    }
    .project-hero img {
      width: 100%;
      height: 100%;
      max-height: 520px;
      object-fit: cover;
      display: block;
    }
    .project-meta {
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    .project-number {
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .project-title {
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1.04;
      font-weight: 600;
      color: var(--text);
    }
    .project-overview {
      max-width: 760px;
      color: var(--text-mid);
      font-size: 17px;
      line-height: 1.7;
    }
    .project-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .project-tag-chip {
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .project-sections {
      display: grid;
      gap: 14px;
    }
    .project-section {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.36);
    }
    .project-section h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .project-section p {
      color: var(--text-mid);
      line-height: 1.75;
    }
    .project-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .project-gallery-item {
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface-frost);
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .project-gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .project-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .project-link {
      text-decoration: none;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text);
      transition: all var(--transition);
    }
    .project-link:hover {
      background: var(--text);
      color: var(--bg);
    }
    .resensio-hero-banner {
      width: 100%;
      aspect-ratio: 16 / 5;
      background: linear-gradient(135deg, #0f0d1e 0%, #1a1535 30%, #2d2760 60%, #4a3fa0 85%, #6C63D5 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
    }
    .resensio-hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(156,147,245,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(156,147,245,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .resensio-hero-bg1,
    .resensio-hero-bg2,
    .resensio-hero-bg3,
    .resensio-hero-bg4,
    .resensio-hero-bg5 {
      position: absolute;
      border-radius: 50%;
    }
    .resensio-hero-bg1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle at 40% 35%, #6C63D5 0%, #2d2760 60%, transparent 100%);
      top: -200px;
      right: -100px;
      opacity: 0.4;
    }
    .resensio-hero-bg2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 40% 35%, #9B93F5 0%, #3b3494 60%, transparent 100%);
      bottom: -120px;
      left: -60px;
      opacity: 0.3;
    }
    .resensio-hero-bg3 {
      width: 180px;
      height: 180px;
      border: 1px solid rgba(156,147,245,0.15);
      top: 20px;
      left: 160px;
    }
    .resensio-hero-bg4 {
      width: 90px;
      height: 90px;
      border: 0.5px solid rgba(156,147,245,0.12);
      bottom: 30px;
      right: 300px;
    }
    .resensio-hero-bg5 {
      width: 40px;
      height: 40px;
      border: 0.5px solid rgba(156,147,245,0.18);
      top: 40px;
      right: 320px;
    }
    .resensio-hero-left {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 28px;
      flex: 0 0 auto;
    }
    .resensio-hero-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #c4c0fa 0%, #6C63D5 45%, #2d2860 100%);
      position: relative;
      flex-shrink: 0;
    }
    .resensio-hero-orb::after {
      content: "";
      position: absolute;
      top: 12px;
      left: 16px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      filter: blur(5px);
    }
    .resensio-hero-text {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-transform: none;
      letter-spacing: normal;
    }
    .resensio-hero-wordmark {
      font-family: "DM Serif Display", Georgia, serif;
      font-size: 58px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1;
      white-space: nowrap;
    }
    .resensio-hero-wordmark span { color: #9B93F5; }
    .resensio-hero-tagline {
      font-family: "DM Sans", sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6B64B8;
      white-space: nowrap;
    }
    .resensio-hero-divider {
      position: relative;
      z-index: 2;
      width: 0.5px;
      height: 60px;
      background: rgba(156,147,245,0.2);
      flex-shrink: 0;
    }
    .resensio-hero-right {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      flex: 0 0 auto;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .resensio-hero-right p {
      font-family: "DM Sans", sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(156,147,245,0.55);
      white-space: nowrap;
    }
    @media (max-width: 980px) {
      .resensio-hero-banner {
        aspect-ratio: auto;
        min-height: 280px;
        flex-direction: column;
        justify-content: center;
        gap: 14px;
        padding: 24px 20px;
      }
      .resensio-hero-divider {
        width: 80px;
        height: 0.5px;
      }
      .resensio-hero-right {
        align-items: center;
        gap: 6px;
      }
      .resensio-hero-wordmark {
        font-size: clamp(36px, 9vw, 52px);
      }
      .resensio-hero-bg3,
      .resensio-hero-bg4,
      .resensio-hero-bg5 {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <svg style="display: none" aria-hidden="true" focusable="false">
      <filter id="glass-distortion">
        <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="2" result="noise"></feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="77"></feDisplacementMap>
      </filter>
    </svg>
    <nav class="glass-nav">
      <div class="glass-filter"></div>
      <div class="glass-overlay"></div>
      <div class="glass-specular"></div>
      <div class="glass-content nav-inner">
        <a href="index.html" class="nav-logo">ERIK GUZA<sup>™</sup></a>
        <ul class="nav-links nav-list">
          <li><a href="index.html#hero" class="nav-item">Home</a></li>
          <li><a href="index.html#about" class="nav-item">About</a></li>
          <li><a href="index.html#experience" class="nav-item">Experience</a></li>
          <li><a href="index.html#education" class="nav-item">Education</a></li>
          <li><a href="projects.html" class="nav-item active">Projects</a></li>
          <li><a href="reading.html" class="nav-item">Reading</a></li>
          <li><a href="blog.html" class="nav-item">Blog</a></li>
          <li><a href="mailto:erikguzawork@gmail.com" class="nav-cta">Get in Touch</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="project-main">
    <section class="section-wrap">
      <div id="project-root" class="project-shell"></div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span class="footer-copy">© 2025 Erik Guza</span>
      <div class="footer-links">
        <a href="projects.html">Projects</a>
        <a href="reading.html">Reading</a>
        <a href="blog.html">Blog</a>
      </div>
    </div>
  </footer>

  <script src="project-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    const projects = Array.isArray(window.PROJECTS) ? window.PROJECTS : [];
    const project = projects.find((item) => item.slug === slug);
    const root = document.getElementById("project-root");

    const escapeHtml = (text) =>
      String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");

    const renderRichText = (text) => {
      const escaped = escapeHtml(text);
      return escaped.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    };

    const renderLinks = (links) => {
      if (!links) return "";
      const map = [
        { key: "live", label: "Live Site" },
        { key: "demo", label: "Demo" },
        { key: "github", label: "GitHub" },
      ];
      const html = map
        .filter((item) => links[item.key])
        .map(
          (item) =>
            `<a class="project-link" href="${escapeHtml(links[item.key])}" target="_blank" rel="noopener noreferrer">${item.label}</a>`
        )
        .join("");
      return html ? `<div class="project-links">${html}</div>` : "";
    };

    const renderGallery = (gallery) => {
      if (!Array.isArray(gallery) || gallery.length === 0) return "";
      const html = gallery
        .map((item) => {
          const src = item && item.src ? item.src : "";
          const alt = item && item.alt ? item.alt : "Project gallery image";
          if (!src) {
            return `<div class="project-gallery-item">Image slot</div>`;
          }
          return `<div class="project-gallery-item"><img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" /></div>`;
        })
        .join("");
      return `<div class="project-gallery">${html}</div>`;
    };

    const renderResensioCover = () => `
      <div class="resensio-hero-banner" aria-label="Resensio project hero banner">
        <div class="resensio-hero-grid"></div>
        <div class="resensio-hero-bg1"></div>
        <div class="resensio-hero-bg2"></div>
        <div class="resensio-hero-bg3"></div>
        <div class="resensio-hero-bg4"></div>
        <div class="resensio-hero-bg5"></div>
        <div class="resensio-hero-left">
          <div class="resensio-hero-orb"></div>
          <div class="resensio-hero-text">
            <div class="resensio-hero-wordmark"><span>Re</span>sensio</div>
            <div class="resensio-hero-tagline">Feel what's inside</div>
          </div>
        </div>
        <div class="resensio-hero-divider"></div>
        <div class="resensio-hero-right">
          <p>Alexithymia awareness</p>
          <p>TAS-20 certified scale</p>
          <p>Emotional journal</p>
          <p>Science-backed</p>
        </div>
      </div>
    `;

    if (!project) {
      document.title = "Project not found — Erik Guza";
      root.innerHTML = `
        <a class="project-back" href="projects.html">← Back to projects</a>
        <div class="project-section">
          <h2>Project not found</h2>
          <p>The project link is invalid or this project has not been published yet.</p>
        </div>
      `;
    } else {
      document.title = `${project.title} — Erik Guza`;
      const hero = project.slug === "project-02"
        ? renderResensioCover()
        : project.heroImage
          ? `<img src="${escapeHtml(project.heroImage)}" alt="${escapeHtml(project.title)} hero image" />`
          : "Project hero image";
      const tags = (project.tags || [])
        .map((tag) => `<span class="project-tag-chip">${escapeHtml(tag)}</span>`)
        .join("");
      const sections = (project.sections || [])
        .map(
          (section) => `
            <article class="project-section">
              <h2>${escapeHtml(section.heading)}</h2>
              <p>${renderRichText(section.body)}</p>
            </article>
          `
        )
        .join("");
      root.innerHTML = `
        <a class="project-back" href="projects.html">← Back to projects</a>
        <div class="project-hero">${hero}</div>
        <div class="project-meta">
          <p class="project-number">Project ${escapeHtml(project.number || "")}</p>
          <h1 class="project-title">${escapeHtml(project.title)}</h1>
          <p class="project-overview">${renderRichText(project.overview || project.shortDescription || "")}</p>
          <div class="project-tag-list">${tags}</div>
        </div>
        <section class="project-sections">${sections}</section>
        ${renderGallery(project.gallery)}
        ${renderLinks(project.links)}
      `;
    }
  </script>
</body>
</html>
